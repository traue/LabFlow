spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: superSecretKeyForLabFlowJwtTokenGeneration2025!TestingOnly
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
